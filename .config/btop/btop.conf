#? Config file for btop v. 1.3+
color_theme = "tokyo-night"
theme_background = false
truecolor = true
force_tty = true
presets = "cpu:1:default,proc:0:default cpu:0:default,mem:0:default,net:0:default cpu:0:block,net:0:tty"
vim_keys = true
rounded_corners = false
graph_symbol = "braille"
shown_boxes = "cpu mem net proc"
update_ms = 1500
proc_sorting = "cpu direct"
proc_reversed = false
proc_tree = false
proc_colors = true
proc_per_core = true
proc_mem_bytes = true
cpu_graph_upper = "total"
cpu_graph_lower = "gpu"
cpu_invert_lower = true
cpu_bottom = false
cpu_wide = true
show_uptime = true
check_temp = true
show_coretemp = true
temp_scale = "celsius"
base_10_sizes = false
clock_format = "%X"
mem_graphs = true
show_disks = true
only_physical = true
show_io_stat = true
io_mode = false
net_auto = true
net_sync = false
show_battery = true
log_level = "WARNING"
